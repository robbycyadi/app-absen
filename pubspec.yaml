name: app_absen
description: Aplikasi Absensi dengan GPS, Selfie, Payroll, dan QR Code
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Supabase
  supabase_flutter: ^2.5.3

  # GPS & Maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  flutter_polyline_points: ^2.0.0

  # Camera & Image
  image_picker: ^1.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # PDF & Excel
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.4

  # State Management
  provider: ^6.1.2

  # Utilities
  connectivity_plus: ^6.1.0
  flutter_slidable: ^3.1.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
